[variables]
# Laravel/Botble specific configuration
NIXPACKS_PHP_ROOT_DIR = "/app/public"
NIXPACKS_PHP_FALLBACK_PATH = "/index.php"

[phases.install]
# Install composer dependencies without dev packages for production
cmds = [
    "composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader --ignore-platform-reqs"
]

# Skip build phase entirely since assets are pre-compiled in public/themes
[start]
cmd = "nixpacks-start"
